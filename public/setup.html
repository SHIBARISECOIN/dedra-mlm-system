<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>DEEDRA 테스트 계정 생성</title>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #f3f4f6; }
    .card { background: white; padding: 32px; border-radius: 12px; max-width: 500px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    h2 { margin-bottom: 24px; color: #6366f1; }
    .log { background: #1f2937; color: #10b981; padding: 16px; border-radius: 8px; font-size: 13px; font-family: monospace; min-height: 200px; white-space: pre-wrap; margin-top: 16px; }
    button { padding: 12px 24px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 16px; width: 100%; }
    button:disabled { opacity: 0.5; }
    .success { color: #10b981; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
<div class="card">
  <h2>🛠️ DEEDRA 테스트 계정 생성</h2>
  <button id="createBtn" onclick="createTestAccounts()">테스트 계정 3개 생성 시작</button>
  <div class="log" id="log">버튼을 클릭하면 테스트 계정이 생성됩니다...</div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
import { getFirestore, doc, setDoc, serverTimestamp, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCijC0Lfvx0WJFWQc4kukND7yOlA-nABr8",
  authDomain: "dedra-mlm.firebaseapp.com",
  projectId: "dedra-mlm",
  storageBucket: "dedra-mlm.firebasestorage.app",
  messagingSenderId: "990762022325",
  appId: "1:990762022325:web:1b238ef6eca4ffb4b795fc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 테스트 계정 목록
const testAccounts = [
  {
    email: 'test1@deedra.com',
    password: 'Test1234!',
    name: '테스트1호',
    rank: 'G1',
    usdt: 1000,
    dedra: 500,
    bonus: 50,
    referralCode: 'TEST0001',
    referredBy: null,
  },
  {
    email: 'test2@deedra.com',
    password: 'Test1234!',
    name: '테스트2호',
    rank: 'G0',
    usdt: 500,
    dedra: 200,
    bonus: 20,
    referralCode: 'TEST0002',
    referredBy: null,
  },
  {
    email: 'test3@deedra.com',
    password: 'Test1234!',
    name: '테스트3호',
    rank: 'G2',
    usdt: 5000,
    dedra: 2000,
    bonus: 300,
    referralCode: 'TEST0003',
    referredBy: null,
  },
];

function log(msg, type = '') {
  const el = document.getElementById('log');
  const color = type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : type === 'info' ? '#60a5fa' : '#d1d5db';
  el.innerHTML += `<span style="color:${color}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

window.createTestAccounts = async function() {
  const btn = document.getElementById('createBtn');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';

  for (const account of testAccounts) {
    log(`\n📋 [${account.email}] 처리 중...`, 'info');

    try {
      let uid;
      try {
        // 계정 생성 시도
        const cred = await createUserWithEmailAndPassword(auth, account.email, account.password);
        uid = cred.user.uid;
        log(`  ✅ Auth 계정 생성 완료 (UID: ${uid.substring(0,8)}...)`, 'success');
      } catch (err) {
        if (err.code === 'auth/email-already-in-use') {
          // 이미 있으면 로그인해서 UID 가져오기
          const cred = await signInWithEmailAndPassword(auth, account.email, account.password);
          uid = cred.user.uid;
          log(`  ℹ️ 이미 존재하는 계정, UID 확인: ${uid.substring(0,8)}...`, 'info');
        } else {
          throw err;
        }
      }

      // Firestore users 문서 생성/업데이트
      await setDoc(doc(db, 'users', uid), {
        uid,
        email: account.email,
        name: account.name,
        role: 'member',
        rank: account.rank,
        status: 'active',
        referralCode: account.referralCode,
        referredBy: account.referredBy,
        createdAt: serverTimestamp(),
        phone: '',
        withdrawPin: btoa('123456'), // 기본 PIN: 123456
      }, { merge: true });
      log(`  ✅ users 문서 저장 완료`, 'success');

      // Firestore wallets 문서 생성
      await setDoc(doc(db, 'wallets', uid), {
        userId: uid,
        usdtBalance: account.usdt,
        dedraBalance: account.dedra,
        bonusBalance: account.bonus,
        totalDeposit: account.usdt,
        totalWithdrawal: 0,
        totalEarnings: account.bonus,
        createdAt: serverTimestamp(),
      }, { merge: true });
      log(`  ✅ wallets 문서 저장 완료 (USDT: ${account.usdt}, DEEDRA: ${account.dedra})`, 'success');

    } catch (err) {
      log(`  ❌ 오류: ${err.message}`, 'error');
    }
  }

  log('\n\n🎉 완료! 아래 계정으로 로그인하세요:', 'success');
  log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
  testAccounts.forEach(a => {
    log(`📧 이메일: ${a.email}`, 'success');
    log(`🔑 비밀번호: ${a.password}`, 'success');
    log(`💎 직급: ${a.rank}  |  USDT: ${a.usdt}  |  DEEDRA: ${a.dedra}`, 'info');
    log(`🔐 출금PIN: 123456`, 'info');
    log('──────────────────────────────────────', '');
  });

  btn.disabled = false;
};
</script>
</body>
</html>
