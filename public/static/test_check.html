<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Check Settlement</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    // Copy config from app.v3.js or firebase.v3.js
    fetch('firebase.v3.js').then(r => r.text()).then(async text => {
      // Find config
      const match = text.match(/const firebaseConfig = ({[\s\S]*?});/);
      if (match) {
        const config = eval('(' + match[1] + ')');
        const app = initializeApp(config);
        const db = getFirestore(app);
        
        // Let's fetch settlements/today
        const today = new Date(Date.now() + 9 * 3600 * 1000).toISOString().slice(0, 10);
        const docRef = doc(db, 'settlements', today);
        const snap = await getDoc(docRef);
        let res = "";
        if (snap.exists()) {
          res += "Settlement Today: " + JSON.stringify(snap.data(), null, 2) + "\n\n";
        } else {
          res += "No settlement found for today (" + today + ")\n\n";
        }

        // Fetch recent transactions
        const q = query(collection(db, 'transactions'), orderBy('createdAt', 'desc'), limit(10));
        const qSnap = await getDocs(q);
        res += "Recent TXs:\n";
        qSnap.forEach(d => {
          const t = d.data();
          res += `${t.type} | ${t.amountUsdt || t.amount} | status: ${t.status}\n`;
        });
        
        document.body.innerText = res;
      }
    });
  </script>
</head>
<body>Loading...</body>
</html>
