<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DDRA 코인 불리기</title>
    <style>
      :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; background: #070a10; color: #fff; }
      main { max-width: 720px; margin: 0 auto; padding: 34px 20px 60px; }
      .hero { border: 1px solid rgba(22,199,132,.26); border-radius: 28px; padding: 28px; background: linear-gradient(135deg, rgba(12,64,54,.96), rgba(10,17,28,.98)); }
      .eyebrow { color: #16c784; font-weight: 900; font-size: 12px; letter-spacing: .04em; }
      h1 { font-size: 38px; margin: 10px 0 12px; }
      p { color: #aab6c7; line-height: 1.65; }
      .grid { display: grid; gap: 14px; margin-top: 22px; }
      .card { border: 1px solid rgba(148,163,184,.16); border-radius: 20px; padding: 18px; background: rgba(15,23,42,.76); }
      .card strong { display: block; font-size: 18px; margin-bottom: 8px; }
      .pill { display: inline-flex; border: 1px solid rgba(22,199,132,.28); color: #16c784; border-radius: 999px; padding: 7px 11px; font-weight: 800; font-size: 12px; }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <span class="pill">WEB HYBRID</span>
        <div class="eyebrow" style="margin-top:22px">REWARD LAB</div>
        <h1>코인 불리기</h1>
        <p>이 화면은 앱 업데이트 없이 운영 가능한 광고 리워드, 출석, 미션, 프리즈 부스터 안내 페이지입니다. AdMob 보상은 정책에 맞춰 앱 내부 부스터 중심으로 설계하세요.</p>
      </section>
      <section class="grid">
        <div class="card"><strong>광고 리워드</strong><p>광고 시청 완료 후 앱 내부 부스터 포인트를 안내합니다.</p></div>
        <div class="card"><strong>출석 보상</strong><p>일간 방문과 연속 참여를 유도하는 이벤트 영역입니다.</p></div>
        <div class="card"><strong>프리즈 부스터</strong><p>프리즈 참여자에게 더 좋은 앱 내부 혜택을 보여줍니다.</p></div>
      </section>
    </main>
  </body>
</html>
