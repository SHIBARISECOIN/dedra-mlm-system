<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DDRA 프리즈</title>
    <style>
      :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; background: #070a10; color: #fff; }
      main { max-width: 720px; margin: 0 auto; padding: 34px 20px 60px; }
      .hero { border: 1px solid rgba(189,235,255,.26); border-radius: 28px; padding: 28px; background: linear-gradient(135deg, rgba(28,50,72,.96), rgba(10,17,28,.98)); }
      .eyebrow { color: #bdebff; font-weight: 900; font-size: 12px; letter-spacing: .04em; }
      h1 { font-size: 38px; margin: 10px 0 12px; }
      p { color: #aab6c7; line-height: 1.65; }
      .grid { display: grid; gap: 14px; margin-top: 22px; }
      .card { border: 1px solid rgba(148,163,184,.16); border-radius: 20px; padding: 18px; background: rgba(15,23,42,.76); }
      .card strong { display: block; font-size: 18px; margin-bottom: 8px; }
      .pill { display: inline-flex; border: 1px solid rgba(189,235,255,.28); color: #bdebff; border-radius: 999px; padding: 7px 11px; font-weight: 800; font-size: 12px; }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <span class="pill">WEB HYBRID</span>
        <div class="eyebrow" style="margin-top:22px">DDRA FREEZE</div>
        <h1>모든 대표 코인 프리즈</h1>
        <p>이 화면은 앱 업데이트 없이 웹에서 바로 바꿀 수 있는 프리즈 운영 페이지입니다. DDRA, USDT, SOL, BTC, XRP 등 대표 코인을 상품별로 안내할 수 있습니다.</p>
      </section>
      <section class="grid">
        <div class="card"><strong>스테디 프리즈</strong><p>짧은 기간의 입문형 프리즈 상품을 안내합니다.</p></div>
        <div class="card"><strong>프라임 프리즈</strong><p>중기 보관과 부스터 혜택 중심으로 운영합니다.</p></div>
        <div class="card"><strong>볼트 프리즈</strong><p>장기 참여자를 위한 프리미엄 이벤트 영역입니다.</p></div>
      </section>
    </main>
  </body>
</html>
